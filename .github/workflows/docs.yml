name: Deploy Doxygen to GitHub Pages

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Doxygen + Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz

      - name: Generate Doxyfile from template
        run: |
          sed "s|@CMAKE_SOURCE_DIR@|${GITHUB_WORKSPACE}|g" Doxyfile.in > Doxyfile
          # Tag docs with commit short SHA
          SHORT_SHA=$(git rev-parse --short HEAD)
          sed -i "s|PROJECT_NUMBER         = \"dev\"|PROJECT_NUMBER         = \"${SHORT_SHA}\"|" Doxyfile

      - name: Run Doxygen
        run: doxygen Doxyfile

      - name: Add .nojekyll
        run: touch docs/html/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
