      - heading "Features at a glance" [level=2] [ref=e247]: Features at a glance
      - paragraph
      - list [ref=e248]:
        - listitem [ref=e249]: Singleton engine with window, GL context, input, render queue, physics.
        - listitem [ref=e250]: Command-queue renderer — Mesh + Material paired at submit time.
        - listitem [ref=e251]: Component scene graph — GameObject tree, JSON-loadable.
        - listitem [ref=e252]: Bullet physics — static / dynamic / kinematic rigid bodies, capsule character controller.
        - listitem [ref=e253]: glTF import — mesh + skeletal animation, one call.
        - listitem [ref=e254]: Shadertoy-style shader sandbox — iTime, iResolution, iMouse uniforms wired for quick experiments.
